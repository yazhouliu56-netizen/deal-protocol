name: CI - TypeCheck & E2E Verification

on:
  push:
    branches: [ main, master, dev, "feat/*", "fix/*" ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  verify:
    name: TypeCheck & E2E Regression
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://127.0.0.1:54321' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: 📥 检出项目代码
        uses: actions/checkout@v4

      - name: 🟢 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 安装依赖项
        run: npm ci

      - name: 🔍 TypeScript 全量类型检查
        run: npx tsc --noEmit

      - name: 🚀 运行四大主线 E2E 自动化回归测试
        if: env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: npm run test:verify
